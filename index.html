<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>疲労シャカシャカ — プロトタイプ</title>
<link rel="icon" type="image/png" href="icon/kamepace-icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon/kamepace-icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#dcdad2">
<link rel="stylesheet" href="design_handoff_fatigue_shaka/styles.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;height:100%}
  body{font-family:var(--font-ui);background:#dcdad2;display:flex;align-items:flex-start;justify-content:center;min-height:100vh}

  /* phone */
  .phone{width:100vw;height:100vh;background:transparent;border-radius:0;padding:0;box-shadow:none;position:relative}
  .stage{position:absolute;inset:0;border-radius:0;overflow:hidden;background:var(--paper)}

  /* スマホ用LPをPCで開いたとき：中央に縦長のスマホ枠、周りに装飾 */
  .deco{display:none}
  @media (min-width:760px){
    body{align-items:center;background:radial-gradient(120% 120% at 50% 0%, #e6e4dc 0%, #d2d0c7 100%)}
    .phone{width:392px;height:92vh;border-radius:46px;overflow:hidden;
      box-shadow:0 30px 70px rgba(27,27,24,.28), 0 0 0 10px #1b1b18, 0 0 0 12px #2c2c28}
    .stage{border-radius:36px}
  }
  /* 装飾は左右に余白が取れる広い画面のみ */
  @media (min-width:1040px){
    .deco{display:flex;position:fixed;z-index:2;align-items:center}
    .deco img{display:block}
    .deco-brand{top:34px;left:44px;gap:14px}
    .deco-brand img{width:54px;height:54px;border-radius:14px;box-shadow:0 6px 16px rgba(27,27,24,.2)}
    .deco-title{font-family:var(--font-display,var(--font-ui));font-weight:800;font-size:26px;color:var(--ink,#1b1b18)}
    /* 右側の余白（スマホ枠の右端〜画面右端）の中央に配置。枠幅392px→半分196px */
    .deco-qr{left:calc(75% + 98px);top:50%;transform:translate(-50%,-50%);flex-direction:column;gap:10px}
    .deco-qr img{width:160px;height:160px}
    .deco-qr-label{font-family:var(--font-mono,monospace);font-size:12px;font-weight:700;letter-spacing:.06em;color:#1b1b18}
  }

  .flip{position:absolute;inset:0}
  .face{position:absolute;inset:0;overflow:hidden;display:flex;flex-direction:column;transition:opacity .4s ease}
  .face.front{opacity:1;transform:none;z-index:2}
  .face.back{opacity:0;transform:none;pointer-events:none;z-index:1}
  .flip.flipped .face.front{opacity:0;pointer-events:none}
  .flip.flipped .face.back{opacity:1;pointer-events:auto;z-index:3}

  .statusbar{height:44px;flex:0 0 44px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--ink);position:relative;z-index:6}
  .statusbar.light{color:#fff}

  .shaka{position:absolute;inset:0;overflow:hidden;pointer-events:none}
  .shaka span{position:absolute;filter:drop-shadow(0 5px 7px rgba(27,27,24,.16));transition:bottom .7s cubic-bezier(.2,.8,.3,1), transform .5s ease, opacity .5s ease}

  .physics{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;transition:filter .4s ease}
  .physics.frosted{filter:blur(2px)}
  .charm{position:absolute;top:0;left:0;display:flex;align-items:center;justify-content:center;will-change:transform;user-select:none;pointer-events:none;filter:drop-shadow(0 4px 5px rgba(27,27,24,.22));transform-origin:center center}
  .charm img{display:block;width:100%;height:100%;object-fit:contain;}
  .pop-fx{position:absolute;pointer-events:none;border-radius:50%;border:3px solid var(--lime);animation:popfx .4s ease-out forwards}
  @keyframes popfx{0%{width:0;height:0;opacity:.9}60%{opacity:.6}100%{width:60px;height:60px;opacity:0;margin:-30px}}
  .emoji-icon img{display:inline-block;vertical-align:middle;}

  .caps{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3)}
  .tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 9px;border-radius:var(--r-sm)}
  .track{height:12px;border-radius:999px;background:var(--surface-sunk);overflow:hidden}
  .fill{height:100%;border-radius:999px;transition:width .5s ease, background .4s ease}

  .list{flex:1;overflow-y:auto;padding:2px 20px 120px;display:flex;flex-direction:column;gap:9px}
  .list::-webkit-scrollbar{display:none}
  .item{display:flex;background:var(--surface);border-radius:var(--r-md);box-shadow:var(--shadow-card);overflow:hidden;cursor:pointer;transition:opacity .3s, transform .12s;animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .item:active{transform:scale(.985)}
  .item .tt{background:var(--ink);color:#fff;padding:9px 11px;font-family:var(--font-mono);min-width:60px;display:flex;flex-direction:column;justify-content:center}
  .item .tt .f{font-size:12px;font-weight:700}
  .item .tt .t{font-size:9px;color:var(--ink-3)}
  .item .bd{flex:1;padding:9px 13px;display:flex;align-items:center;gap:9px;min-width:0}
  .item .ttl{flex:1;min-width:0;font-size:14px;font-weight:500;display:flex;align-items:flex-start;gap:8px}
  .item .ttl > img{flex:0 0 auto;margin-top:1px}
  .ttl-text{flex:1;min-width:0;line-height:1.35;word-break:break-word}
  .item .mood-face{font-size:22px;filter:drop-shadow(0 3px 4px rgba(27,27,24,.18))}
  .item .d{font-family:var(--font-mono);font-size:13px;font-weight:700;min-width:34px;text-align:right}
  .item.exp{opacity:.42}
  .item.exp .ttl{text-decoration:line-through}
  .item.planned{background:var(--surface-sunk)}
  .item.planned .tt{background:var(--ink-3)}
  .item.planned .ttl{color:var(--ink-3)}
  .item.planned .mood-face{filter:grayscale(1);opacity:.6}
  .plan-badge{display:inline-block;font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:.06em;color:#fff;background:var(--ink-3);border-radius:5px;padding:2px 6px;margin-right:7px;vertical-align:middle}
  .list-empty{text-align:center;color:var(--ink-3);font-size:14px;padding:48px 20px;line-height:1.6}
  .task-head{font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--ink-3);margin:18px 2px 4px}
  .task-row{display:flex;align-items:center;gap:11px;background:var(--surface);border-radius:var(--r-md);box-shadow:var(--shadow-card);padding:12px 14px;cursor:default}
  .task-check{flex:0 0 auto;width:24px;height:24px;border-radius:50%;border:2px solid var(--line);background:var(--surface);cursor:pointer;padding:0;transition:all .15s}
  .task-check:active{background:var(--lime);border-color:var(--lime)}
  .task-ttl{flex:1;font-size:14px;font-weight:500;color:var(--ink)}

  .dnav{width:30px;height:30px;flex:0 0 auto;border:none;background:var(--surface-sunk);color:var(--ink);border-radius:50%;font-size:20px;line-height:1;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 0 2px}
  .dnav:active{background:var(--line)}
  .menu{width:40px;height:40px;background:var(--ink);border-radius:10px;display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;cursor:pointer;position:relative;z-index:12}
  .menu i{width:18px;height:2px;background:#fff;display:block}
  .menu-dropdown{display:none;position:absolute;right:20px;top:90px;background:var(--ink);border-radius:14px;padding:14px 16px;z-index:11;box-shadow:var(--shadow-pop);align-items:center;gap:10px;min-width:200px}
  .menu-dropdown.open{display:flex;flex-direction:column;align-items:stretch;gap:12px}
  .menu-label{font-family:var(--font-mono);font-size:11px;font-weight:700;color:#fff;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
  .menu-slider{flex:1;accent-color:var(--lime);height:4px}
  .menu-value{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--lime);min-width:32px;text-align:right}

  .btn{font-family:var(--font-ui);font-weight:700;border:none;border-radius:12px;cursor:pointer;font-size:14px}
  .btn-mono{font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
  .pri{background:var(--lime);color:var(--lime-ink)}
  .ink{background:var(--ink);color:var(--lime)}
  .sunk{background:var(--surface-sunk);color:var(--ink-2)}
  .pink{background:var(--pink);color:#fff}

  .fab{position:absolute;right:18px;bottom:22px;width:60px;height:60px;border-radius:50%;background:var(--lime);color:var(--lime-ink);font-size:30px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-pop);z-index:8;cursor:pointer;border:none;transition:transform .12s}
  .fab:active{transform:scale(.92)}

  .flipbtn{position:absolute;left:50%;transform:translateX(-50%);bottom:30px;z-index:8;display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;border:none;border-radius:999px;padding:11px 18px;font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;box-shadow:var(--shadow-pop)}
  .flipbtn .dot{width:18px;height:18px;border-radius:50%;background:var(--lime);color:var(--lime-ink);display:flex;align-items:center;justify-content:center;font-size:11px}

  .drawer{position:absolute;top:44%;right:0;z-index:7;display:flex;align-items:stretch;transform:translateY(-50%) translateX(calc(100% - 36px));transition:transform .35s cubic-bezier(.6,.02,.2,1)}
  .drawer.open{transform:translateY(-50%) translateX(0)}
  .drawer-tab{width:36px;border:none;background:var(--ink);color:#fff;border-radius:16px 0 0 16px;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.14em;writing-mode:vertical-rl;text-orientation:upright;padding:14px 0;cursor:pointer}
  .drawer-body{display:flex;flex-direction:column;gap:8px;background:var(--ink);padding:10px;border-radius:0 0 0 16px}
  .tool{display:flex;flex-direction:column;align-items:center;gap:3px;background:rgba(255,255,255,.09);border:none;color:#fff;border-radius:12px;padding:9px 14px;font-size:22px;cursor:pointer;transition:background .15s}
  .tool span{font-family:var(--font-mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;font-weight:700}
  .tool:active{background:rgba(255,255,255,.2)}

  .scrim{position:absolute;inset:0;background:rgba(20,20,15,.42);z-index:20;opacity:0;pointer-events:none;transition:opacity .3s}
  .scrim.on{opacity:1;pointer-events:auto}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-radius:26px 26px 0 0;z-index:21;transform:translateY(110%);transition:transform .4s cubic-bezier(.6,.02,.2,1);padding:10px 22px 26px;box-shadow:0 -10px 30px rgba(0,0,0,.18);max-height:84%;overflow-y:auto}
  .sheet.on{transform:translateY(0)}
  .sheet::-webkit-scrollbar{display:none}
  .grab{width:42px;height:4px;border-radius:2px;background:var(--line);margin:6px auto 16px}

  .field{margin-bottom:16px}
  .field > label{display:block;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:2px solid var(--line);background:var(--surface);border-radius:999px;padding:8px 13px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--font-ui)}
  .chip.sel{border-color:var(--ink);background:var(--ink);color:#fff}
  .moodrow{display:flex;gap:6px;justify-content:space-between}
  .moodbtn{flex:1;aspect-ratio:1;border:2px solid var(--line);background:var(--surface);border-radius:14px;font-size:24px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
  .moodbtn.sel{border-color:var(--pink);background:var(--pink-soft);transform:scale(1.05)}
  .timeinputs{display:flex;align-items:center;gap:10px}
  .timeinputs input{flex:1;min-width:0;font-family:var(--font-mono);font-size:15px;font-weight:700;border:2px solid var(--line);border-radius:10px;padding:10px 6px;text-align:center;color:var(--ink)}
  .textinput{width:100%;font-family:var(--font-ui);font-size:15px;font-weight:500;border:2px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--ink);background:var(--surface)}
  .textinput:focus{outline:none;border-color:var(--ink)}
  .deltarow{display:flex;align-items:center;gap:10px}
  .stepbtn{width:44px;height:44px;border:2px solid var(--line);border-radius:12px;background:var(--surface);font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--ink);cursor:pointer;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
  .stepbtn:active{background:var(--surface-sunk)}
  .numinput{width:74px;min-width:0;font-family:var(--font-display);font-weight:800;font-size:23px;border:2px solid var(--line);border-radius:10px;padding:6px 6px;text-align:center;color:var(--ink)}
  .numinput:focus{outline:none;border-color:var(--ink)}
  .emojiprev{margin-left:auto;display:flex;flex-direction:column;align-items:center;gap:3px}
  .emojiprev .pe{filter:drop-shadow(0 4px 5px rgba(27,27,24,.18));transition:opacity .2s}
  .emojiprev .pl{font-family:var(--font-mono);font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3)}
  .emojigrid{display:flex;flex-wrap:wrap;gap:2px;margin-top:12px;min-height:28px;transition:opacity .2s}
  .emojigrid span{font-size:26px;line-height:1;filter:drop-shadow(0 2px 3px rgba(27,27,24,.16))}

  .backwrap{position:absolute;inset:0;background:transparent;display:flex;flex-direction:column}
  .backwrap .shaka span{filter:drop-shadow(0 5px 8px rgba(27,27,24,.18))}
  .glasscase{position:absolute;inset:0;border-radius:38px;z-index:2;pointer-events:none;
    border:3px solid var(--lime);
    box-shadow: inset 0 2px 1px rgba(255,255,255,.85), inset 0 0 28px rgba(255,255,255,.5), inset 0 -16px 32px rgba(27,27,24,.05), 0 0 0 1px rgba(27,27,24,.06);
    background: linear-gradient(125deg, rgba(255,255,255,.55) 0%, rgba(255,255,255,0) 24%, rgba(255,255,255,0) 58%, rgba(255,255,255,.30) 74%, rgba(255,255,255,0) 88%);}

  .toast{position:absolute;left:50%;bottom:104px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:10px 16px;border-radius:999px;z-index:30;opacity:0;pointer-events:none;transition:all .3s;font-family:var(--font-ui)}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .em{margin-right:6px}

  /* ---- achievement (collect) page ---- */
  .collect{position:absolute;inset:0;z-index:9;background:var(--paper);display:flex;flex-direction:column;color:var(--ink);transform:translateX(100%);transition:transform .35s cubic-bezier(.6,.02,.2,1)}
  .collect.open{transform:translateX(0)}
  .collect-head{display:flex;align-items:center;gap:12px;padding:2px 20px 12px}
  .collect-back{border:none;background:var(--ink);color:#fff;font-family:var(--font-mono);font-size:12px;font-weight:700;border-radius:999px;padding:9px 14px;cursor:pointer}
  .collect-title{font-size:18px;font-weight:700}
  .collect-total{margin-left:auto;font-family:var(--font-display);font-weight:800;font-size:26px}
  .collect-scroll{flex:1;overflow-y:auto;position:relative}
  .collect-scroll::-webkit-scrollbar{display:none}
  .collect-stack{position:relative;width:100%}
  .collect-grid{position:absolute;left:0;right:0;height:0;border-top:1px dashed var(--line);pointer-events:none}
  .collect-grid span{position:absolute;top:0;transform:translateY(-50%);font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--ink-3);background:var(--paper);padding:0 6px}
  .collect-grid .lab-l{left:8px}
  .collect-grid .lab-r{right:8px}
  .collect-charm{position:absolute;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 4px 5px rgba(27,27,24,.22))}
  .collect-charm img{width:100%;height:100%;object-fit:contain;pointer-events:none}
  .collect-empty{position:absolute;left:0;right:0;bottom:40px;display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-size:14px;text-align:center;padding:0 44px;line-height:1.6}

  /* ---- auth gate ---- */
  .authgate{position:absolute;inset:0;z-index:100;background:var(--paper);display:flex;align-items:center;justify-content:center;padding:28px}
  .authgate.hidden{display:none}
  .authclose{position:absolute;top:18px;right:18px;width:38px;height:38px;border:none;border-radius:50%;background:var(--surface-sunk);color:var(--ink-2);font-size:16px;cursor:pointer;z-index:101}
  .authguest{margin-top:8px;border:none;background:transparent;color:var(--ink-3);font-family:var(--font-ui);font-size:13px;font-weight:700;text-decoration:underline;cursor:pointer;padding:8px}
  .authcard{width:100%;max-width:340px;display:flex;flex-direction:column;gap:11px}
  .authlogo{font-size:26px;font-weight:800;text-align:center}
  .authsub{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);text-align:center;margin-bottom:8px}
  .authinput{width:100%;font-family:var(--font-ui);font-size:15px;border:2px solid var(--line);border-radius:12px;padding:13px 14px;color:var(--ink);background:var(--surface)}
  .authinput:focus{outline:none;border-color:var(--ink)}
  .authprimary{font-family:var(--font-ui);font-weight:700;border:none;border-radius:12px;cursor:pointer;font-size:15px;padding:14px;background:var(--lime);color:var(--lime-ink)}
  .authprimary.alt{background:var(--surface-sunk);color:var(--ink-2)}
  .authprimary:disabled{opacity:.5;cursor:default}
  .authgoogle{font-family:var(--font-ui);font-weight:700;border:2px solid var(--line);background:var(--surface);color:var(--ink);border-radius:12px;cursor:pointer;font-size:15px;padding:13px;display:flex;align-items:center;justify-content:center;gap:10px}
  .authgoogle img{width:18px;height:18px}
  .authdiv{display:flex;align-items:center;gap:10px;color:var(--ink-3);font-family:var(--font-mono);font-size:11px;margin:2px 0}
  .authdiv::before,.authdiv::after{content:"";flex:1;height:1px;background:var(--line)}
  .autherr{color:#d4453a;font-size:12px;min-height:16px;text-align:center;line-height:1.4}
  .authrow{display:flex;gap:10px}
  .authrow .authprimary{flex:1}

  /* ---- account sheet ---- */
  .acct-head{font-size:19px;font-weight:700;margin-bottom:4px}
  .acct-mail{font-family:var(--font-mono);font-size:12px;color:var(--ink-3);margin-bottom:18px;word-break:break-all}
  .acct-label{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin:0 0 8px}
  .acct-prov{display:flex;align-items:center;justify-content:space-between;background:var(--surface-sunk);border-radius:12px;padding:12px 14px;margin-bottom:8px;font-size:14px;font-weight:500}
  .acct-prov .on{color:var(--lime-ink);font-weight:700;font-family:var(--font-mono);font-size:12px}
  .acct-prov .off{color:var(--ink-3);font-family:var(--font-mono);font-size:12px}
  .acct-link{width:100%;font-family:var(--font-ui);font-weight:700;border:2px solid var(--line);background:var(--surface);color:var(--ink);border-radius:12px;cursor:pointer;font-size:14px;padding:12px;margin-top:4px}
  .acct-set{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .menu-acct{width:100%;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);background:var(--lime);border:none;border-radius:10px;padding:10px;cursor:pointer}
  .menu-seg{display:flex;flex:1;gap:4px;background:rgba(255,255,255,.12);border-radius:9px;padding:3px}
  .menu-seg-btn{flex:1;border:none;background:transparent;color:#fff;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.04em;padding:6px 4px;border-radius:7px;cursor:pointer}
  .menu-seg-btn.active{background:var(--lime);color:var(--lime-ink)}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
<div class="deco deco-brand">
  <img src="icon/kamepace-icon-512.png" alt="かめペース">
  <span class="deco-title">かめペース</span>
</div>
<div class="deco deco-qr">
  <img src="qr_kame-pace.png" alt="このアプリへのQRコード">
  <span class="deco-qr-label">スマホで開く</span>
</div>
<div class="phone"><div class="stage">

  <div class="physics frosted" id="physics"></div>
  <div class="flip" id="flip">

    <div class="face front">
      <div style="position:relative;z-index:2;display:flex;flex-direction:column;height:100%">
        <div class="statusbar"><span>9:41</span></div>

<script>
const EMOJI_MAP = {

const MOODS = ["😆","🙂","😌","🥲","😩","😢"];

const FLUENT_BASE = "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/";
const ACT_ASSET = {

  "通勤":  "Railway car/3D/railway_car_3d.png",
  "レビュー":"Laptop/3D/laptop_3d.png",

  "休憩":  "Hot beverage/3D/hot_beverage_3d.png",
  "昼寝":  "Sleeping face/3D/sleeping_face_3d.png",

  "🙂":"Slightly smiling face/3D/slightly_smiling_face_3d.png",
  "😌":"Relieved face/3D/relieved_face_3d.png",
  "🥲":"Smiling face with tear/3D/smiling_face_with_tear_3d.png",
  "😩":"Weary face/3D/weary_face_3d.png",

};
const FALLBACK_ASSET = "Sparkles/3D/sparkles_3d.png";

function assetSrc(path){ return FLUENT_BASE + encodeURI(path); }
function createAssetImg(name, altText, size="100%"){
  const img=document.createElement("img");
  img.src = assetSrc(name);
  img.alt = altText;
  img.draggable = false;
  img.decoding = "async";
  img.loading = "eager";
  img.style.width = typeof size === "number" ? `${size}px` : size;
  img.style.height = typeof size === "number" ? `${size}px` : size;
  img.style.objectFit = "contain";
  img.style.verticalAlign = "middle";
  img.style.pointerEvents = "none";
  img.onerror = ()=>{ if(img.parentNode){ img.parentNode.replaceChild(document.createTextNode(altText), img); } };
  return img;
}
function actIcon(act, size=22){ return createAssetImg(ACT_ASSET[act] || FALLBACK_ASSET, EMOJI_MAP[act] || "✨", size); }
function moodIcon(mood, size=22){ return MOOD_ASSET[mood] ? createAssetImg(MOOD_ASSET[mood], mood, size) : document.createTextNode(mood); }

function rng(seed){let s=seed*9301+49297;return()=>{s=(s*9301+49297)%233280;return s/233280;};}

const SEED_ENTRIES = [
  {from:"07:30",to:"08:00",title:"通勤・満員電車",act:"通勤",mood:"😩",delta:14,exp:false},
  {from:"09:00",to:"10:30",title:"会議3本",act:"会議",mood:"🥲",delta:18,exp:false},
  {from:"12:30",to:"13:00",title:"ランチ",act:"食事",mood:"🙂",delta:-12,exp:true},
  {from:"15:00",to:"17:40",title:"レビュー対応",act:"レビュー",mood:"😌",delta:16,exp:false},
  {from:"18:30",to:"19:00",title:"散歩",act:"散歩",mood:"🙂",delta:-8,exp:false},
  {from:"22:00",to:"23:00",title:"明日の資料づくり",act:"資料作成",mood:"🙂",delta:10,exp:false,planned:true,dropped:0},
];
const SEED_TASKS = [
  {srcId:"sample:1",title:"買い出しに行く",done:false,act:"家事",delta:6,mood:"🙂"},
  {srcId:"sample:2",title:"メールの返信",done:false,act:"メール",delta:4,mood:"🙂"},
];
/* ---- date helpers (1日ごとの表示) ---- */
const MON_ABBR=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const WD_ABBR=["SUN","MON","TUE","WED","THU","FRI","SAT"];
function pad2(n){ return String(n).padStart(2,"0"); }
function dateToStr(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function strToDate(s){ const [y,m,dd]=s.split("-").map(Number); return new Date(y, m-1, dd); }
function todayStr(){ return dateToStr(new Date()); }
function shiftDate(s, days){ const d=strToDate(s); d.setDate(d.getDate()+days); return dateToStr(d); }
function formatDateCaps(s){ const d=strToDate(s); return d.getFullYear()+" · "+MON_ABBR[d.getMonth()]+" "+d.getDate()+" · "+WD_ABBR[d.getDay()]; }
function dateLabelFor(s){
  const t=todayStr();
  if(s===t) return "今日のログ";
  if(s===shiftDate(t,-1)) return "昨日のログ";
  if(s===shiftDate(t,1)) return "明日のログ";
  const d=strToDate(s); return (d.getMonth()+1)+"月"+d.getDate()+"日のログ";
}
let viewDate = todayStr();

function freshState(){ return { entries: SEED_ENTRIES.map(e=>({...e, date: todayStr()})), sortMode:false, collected:[], collectedSeen:0, templates:{}, tasks: SEED_TASKS.map(t=>({...t})) }; }
let state = freshState();

/* ---- templates (あすけん方式: 同じ予定は同じ疲労度) ---- */
function normTitle(t){ return (t||"").trim().replace(/\s+/g," ").toLowerCase(); }
function getTemplate(title){ const k=normTitle(title); return (state.templates && state.templates[k]) || null; }
function setTemplate(title, act, delta){
  const k=normTitle(title);
  if(!k) return;
  if(!state.templates) state.templates={};
  state.templates[k] = { act, delta };
}

/* ---- planned entries → 時間で割って1個ずつ降らせ、終了で記録に ---- */
function entryStartTs(e){
  const d = strToDate(e.date || todayStr());
  const [hh,mm] = (e.from||"00:00").split(":").map(Number);
  d.setHours(hh||0, mm||0, 0, 0);
  return d.getTime();
}
function entryEndTs(e){
  const d = strToDate(e.date || todayStr());
  const [hh,mm] = (e.to||"00:00").split(":").map(Number);
  d.setHours(hh||0, mm||0, 0, 0);
  return d.getTime();
}
// 現時点で「降っているべき」個数（from→to を疲労度ぶんに等分。第1個は from+間隔）
function planUnitsDue(e, now){
  const N = Math.abs(e.delta);
  if(N <= 0) return 0;
  const fromTs = entryStartTs(e), toTs = entryEndTs(e);
  if(now < fromTs) return 0;
  if(toTs <= fromTs) return now >= toTs ? N : 0; // 長さ0は終了時に全部
  const interval = (toTs - fromTs) / N;
  return Math.max(0, Math.min(N, Math.floor((now - fromTs) / interval)));
}
// 予定の進捗を更新：時間が来たぶんだけ降らせる。全部降ったら記録に昇格
// 予定の進捗を更新（描画はしない）。{changed, negDrops} を返す
function advancePlans(){
  const now = Date.now();
  let changed = false;
  const negDrops = [];
  state.entries.forEach(e=>{
    if(!e.planned) return;
    const N = Math.abs(e.delta);
    const due = planUnitsDue(e, now);
    const cur = e.dropped || 0;
    if(due > cur){
      if(e.delta < 0){ for(let i=0;i<(due-cur);i++) negDrops.push(e.act); }
      e.dropped = due; changed = true;
    }
    if((e.dropped||0) >= N){ e.dropped = N; e.planned = false; changed = true; }
  });
  return { changed, negDrops };
}
// 起動時・追加時のキャッチアップ用（描画は呼び出し側）
function promoteDuePlans(){ return advancePlans().changed; }
// 1秒ごとのリアルタイム進行：降ったぶんを反映して落とす
function tickPlans(){
  const r = advancePlans();
  if(r.changed){ renderAll(); save(); }
  r.negDrops.forEach(act=>dropNegativeParticles(act, 1));
}

/* ---- Googleカレンダー/ToDo 取り込み（モジュールから呼ばれる） ---- */
const IMPORT_DEFAULT_DELTA = 10; // テンプレ未登録の予定のデフォルト疲労度
// タイトルから行動を推測（日本語＋英語＋言い換え）。判定できなければ "" = 中立アイコン
const ACT_KEYWORDS = [
  ["資料作成", ["資料作成","資料","スライド","ドキュメント","slide","ppt","企画書","レポート"]],
  ["会議", ["会議","ミーティング","mtg","meeting","打ち合わせ","打合せ","面談","1on1","商談","朝会","定例"]],
  ["通勤", ["通勤","出社","退社","移動","commute"]],
  ["レビュー", ["レビュー","review","確認","チェック","検収"]],
  ["メール", ["メール","mail","返信","連絡"]],
  ["勉強", ["勉強","学習","study","研修","セミナー","講座","勉強会","受講"]],
  ["運動", ["運動","ジム","トレーニング","筋トレ","workout","gym","ランニング","run","ヨガ"]],
  ["散歩", ["散歩","walk","ウォーキング","お散歩"]],
  ["家事", ["家事","掃除","洗濯","料理","買い物"]],
  ["育児", ["育児","子供","こども","保育","送迎","お迎え","送り"]],
  ["通話", ["通話","電話","call","tel","コール"]],
  ["睡眠", ["睡眠","就寝","寝る","sleep","お休み"]],
  ["昼寝", ["昼寝","仮眠","nap"]],
  ["食事", ["食事","昼食","夕食","朝食","ランチ","lunch","dinner","ディナー","ご飯","ごはん","飲み会","会食","ランチMTG"]],
  ["休憩", ["休憩","休み","break","コーヒー","カフェ","お茶","ブレイク"]],
  ["ゲーム", ["ゲーム","game","プレイ"]],
  ["読書", ["読書","読む","book","リーディング"]],
  ["入浴", ["入浴","風呂","お風呂","シャワー","bath","sauna","サウナ"]],
  ["作業", ["作業","タスク","work","実装","開発","コーディング","対応","準備"]],
];
function guessAct(title){
  const t = (title||"").toLowerCase();
  if(!t) return "";
  for(const [act, kws] of ACT_KEYWORDS){
    if(kws.some(k=>t.includes(k.toLowerCase()))) return act;
  }
  return ""; // 未分類 → 中立アイコン（タップして設定すればテンプレ学習）
}
// items: [{srcId, title, date, from, to}]
window.__importEvents = function(items){
  if(!Array.isArray(items)) return 0;
  const existing = new Set(state.entries.filter(e=>e.srcId).map(e=>e.srcId));
  let added = 0;
  items.forEach(it=>{
    if(!it || !it.srcId || existing.has(it.srcId)) return; // 重複防止
    const tmpl = getTemplate(it.title);
    const act = tmpl ? tmpl.act : guessAct(it.title);
    const delta = tmpl ? tmpl.delta : IMPORT_DEFAULT_DELTA;
    const date = it.date || todayStr();
    const from = it.from || "00:00";
    const to = it.to || "23:59";
    const planned = entryEndTs({date, to}) > Date.now();
    state.entries.push({ from, to, title: it.title||"(無題)", act, mood:"🙂", delta, exp:false, date, planned, dropped:0, srcId: it.srcId, needsSetup: !tmpl });
    existing.add(it.srcId);
    added++;
  });
  if(added){
    state.entries.sort((a,b)=>(a.date||"").localeCompare(b.date||"")||a.from.localeCompare(b.from));
    promoteDuePlans();
    renderAll();
    save();
  }
  return added;
};

// ToDo（Google Tasks）は entries とは別に state.tasks に入れ、TASKリストに縦表示
window.__importTasks = function(items){
  if(!Array.isArray(items)) return 0;
  if(!Array.isArray(state.tasks)) state.tasks = [];
  const existing = new Set(state.tasks.map(t=>t.srcId));
  let added = 0;
  items.forEach(it=>{
    if(!it || !it.srcId || existing.has(it.srcId)) return;
    state.tasks.push({ srcId: it.srcId, title: it.title||"(無題)", done:false });
    existing.add(it.srcId);
    added++;
  });
  if(added){ renderAll(); save(); }
  return added;
};

// タスクにチェック → チェックした時刻の記録として entries に入れ、絵文字を降らせる
function checkTask(srcId){
  const t = (state.tasks||[]).find(x=>x.srcId===srcId);
  if(!t || t.done) return;
  t.done = true;
  const now = new Date();
  const hhmm = pad2(now.getHours())+":"+pad2(now.getMinutes());
  const tmpl = getTemplate(t.title);
  const act = t.act || (tmpl ? tmpl.act : guessAct(t.title));
  const delta = (typeof t.delta === "number") ? t.delta : (tmpl ? tmpl.delta : IMPORT_DEFAULT_DELTA);
  const mood = t.mood || "🙂";
  state.entries.push({
    from: hhmm, to: hhmm, title: t.title,
    act, mood, delta,
    exp:false, date: todayStr(), planned:false, srcId: "taskdone:"+srcId, needsSetup: !tmpl && typeof t.delta!=="number"
  });
  state.entries.sort((a,b)=>(a.date||"").localeCompare(b.date||"")||a.from.localeCompare(b.from));
  renderAll();
  showBack();          // シャカシャカ画面で絵文字が降ってくる
  setTimeout(()=>{
    if(delta < 0){
      dropNegativeParticles(act, Math.abs(delta));
      toast(EMOJI_MAP[act]||"✨", "タスク完了（回復 "+delta+"）");
    } else {
      shakePhysics(16);
      toast(EMOJI_MAP[act]||"✨", "タスク完了（+"+delta+"）");
    }
  }, 400);
  save();
}

function fatigue(){
  let f = 0;
  state.entries.forEach(e=>{
    if(e.exp || e.date!==viewDate) return;
    if(e.planned){ const n=e.dropped||0; f += (e.delta>=0 ? n : -n); } // 予定は降ったぶんだけ
    else f += e.delta;
  });
  return Math.max(0, Math.min(100, Math.round(f)));
}

const { Engine, World, Bodies, Body, Runner } = Matter;
const physicsEl = document.getElementById("physics");
let currentPhysRadius = 18;
let currentPhysFont = 30;
const PHYS_BOUNCE = 0.35;
const PHYS_FRICTION = 0.05;
const PHYS_FRICTION_AIR = 0.014;
const PHYS_DENSITY = 0.001;
let engine, runner;
let physicsBodies = [];
let physicsWalls = [];
let physicsStarted = false;
let physicsRunning = false;

function updatePhysicsSize(){
  const rect = physicsEl.getBoundingClientRect();
  if(rect.width <= 0 || rect.height <= 0) return;
  // 100個で画面全体を埋める: 面積 / (100 * π) * パッキング率
  const area = rect.width * rect.height;
  const r = Math.sqrt(area * 0.6 / (100 * Math.PI));
  currentPhysRadius = Math.max(12, Math.min(r, 60));
  currentPhysFont = Math.round(currentPhysRadius * 1.6);
}

function clamp(value, min, max){
  return Math.max(min, Math.min(max, value));
}

function buildPhysics(){
  if(engine) return;
  engine = Engine.create();
  engine.gravity.y = 0.5;
  engine.gravity.x = 0;
  runner = Runner.create();
  Runner.run(runner, engine);
  physicsRunning = true;
  updatePhysicsSize();
  buildPhysicsWalls();
  physicsStarted = true;
  requestAnimationFrame(renderPhysics);
}

function buildPhysicsWalls(){
  if(!engine) return;
  physicsWalls.forEach(w=>World.remove(engine.world, w));
  physicsWalls = [];
  const rect = physicsEl.getBoundingClientRect();
  const W = rect.width;
  const H = rect.height;
  const t = 80;
  physicsWalls.push(Bodies.rectangle(W/2, H + t/2, W + t*2, t, {isStatic:true}));
  physicsWalls.push(Bodies.rectangle(W/2, -t/2, W + t*2, t, {isStatic:true}));
  physicsWalls.push(Bodies.rectangle(-t/2, H/2, t, H + t*2, {isStatic:true}));
  physicsWalls.push(Bodies.rectangle(W + t/2, H/2, t, H + t*2, {isStatic:true}));
  World.add(engine.world, physicsWalls);
}

function createPileBag(){
  // シャカシャカ画面・ホーム背景の山は常に「今日」を反映（リストの表示日とは独立）
  const td = todayStr();
  const bag = [];
  state.entries.forEach(e=>{
    if(e.delta > 0 && !e.exp && e.date===td){
      const n = e.planned ? (e.dropped||0) : e.delta; // 予定は降ったぶんだけ積む
      for(let i=0;i<n;i++) bag.push(e.act);
    }
  });
  return bag;
}

function createPhysicsParticle(act){
  updatePhysicsSize();
  const rect = physicsEl.getBoundingClientRect();
  const x = currentPhysRadius + Math.random() * (rect.width - 2 * currentPhysRadius);
  const y = currentPhysRadius + Math.random() * (rect.height * 0.5);
  const body = Bodies.circle(x, y, currentPhysRadius, {
    restitution: PHYS_BOUNCE,
    friction: PHYS_FRICTION,
    frictionAir: PHYS_FRICTION_AIR,
    density: PHYS_DENSITY,
  });
  body.act = act;
  body.emoji = EMOJI_MAP[act] || "✨";
  World.add(engine.world, body);
  const el = document.createElement("div");
  el.className = "charm";
  el.style.width = el.style.height = `${currentPhysRadius*2}px`;
  const img = actIcon(act, currentPhysRadius*2);
  el.appendChild(img);
  physicsEl.appendChild(el);
  physicsBodies.push({body, el});
}

function removePhysicsParticle(){
  const particle = physicsBodies.pop();
  if(!particle) return;
  World.remove(engine.world, particle.body);
  particle.el.remove();
}

function syncPhysics(){
  buildPhysics();
  buildPhysicsWalls();
  const bag = createPileBag();
  const target = Math.min(100, bag.length);
  while(physicsBodies.length < target) createPhysicsParticle(bag[physicsBodies.length] || "");
  while(physicsBodies.length > target) removePhysicsParticle();
}

/* ---- negative (recovery) particles ---- */
let negBodies = []; // {body, el, consumed}

function dropNegativeParticles(act, count){
  buildPhysics();
  updatePhysicsSize();
  const rect = physicsEl.getBoundingClientRect();
  for(let i=0;i<count;i++){
    const x = currentPhysRadius + Math.random() * (rect.width - 2 * currentPhysRadius);
    const y = currentPhysRadius + Math.random() * (rect.height * 0.5);
    const body = Bodies.circle(x, y, currentPhysRadius, {
      restitution: PHYS_BOUNCE,
      friction: PHYS_FRICTION,
      frictionAir: PHYS_FRICTION_AIR,
      density: PHYS_DENSITY,
    });
    body.isNegative = true;
    World.add(engine.world, body);
    const el = document.createElement("div");
    el.className = "charm";
    el.style.width = el.style.height = `${currentPhysRadius*2}px`;
    const img = actIcon(act, currentPhysRadius*2);
    el.appendChild(img);
    physicsEl.appendChild(el);
    const neg = {body, el, consumed:false, act};
    negBodies.push(neg);
    setTimeout(()=>{
      if(!neg.consumed){
        neg.consumed = true;
        el.style.transition = "opacity .4s";
        el.style.opacity = "0";
        World.remove(engine.world, body);
        setTimeout(()=>el.remove(), 400);
      }
    }, 30000);
  }
}

function checkNegativeCollisions(){
  let didCollect=false;
  for(let ni=negBodies.length-1;ni>=0;ni--){
    const neg = negBodies[ni];
    if(neg.consumed) continue;
    const np = neg.body.position;
    for(let pi=physicsBodies.length-1;pi>=0;pi--){
      const pos = physicsBodies[pi];
      const pp = pos.body.position;
      const dx = np.x - pp.x, dy = np.y - pp.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < currentPhysRadius * 2){
        const cx = (pp.x + np.x) / 2, cy = (pp.y + np.y) / 2;
        World.remove(engine.world, pos.body);
        World.remove(engine.world, neg.body);
        neg.consumed = true;
        physicsBodies.splice(pi, 1);
        addCollected(neg.act, 1);          // 使った回復の絵文字（食事・休憩など）
        addCollected(pos.body.act, 1);     // 回復で弾かれて消えたプラスの記録（作業など）
        didCollect = true;
        // パッと消える
        pos.el.style.transition = "opacity .15s";
        pos.el.style.opacity = "0";
        neg.el.style.transition = "opacity .15s";
        neg.el.style.opacity = "0";
        // ポップエフェクト（リングがぱっと広がる）
        const fx = document.createElement("div");
        fx.className = "pop-fx";
        fx.style.left = cx + "px";
        fx.style.top = cy + "px";
        physicsEl.appendChild(fx);
        setTimeout(()=>{ pos.el.remove(); neg.el.remove(); fx.remove(); }, 400);
        break;
      }
    }
  }
  negBodies = negBodies.filter(n=>!n.consumed);
  if(didCollect) save();
  // clean up negatives that fell off screen after 5s with no collision
}

function renderPhysics(){
  if(!physicsStarted || !physicsRunning) return;
  physicsBodies.forEach(({body,el})=>{
    el.style.transform = `translate(${body.position.x - currentPhysRadius}px, ${body.position.y - currentPhysRadius}px) rotate(${body.angle}rad)`;
  });
  negBodies.forEach(({body,el,consumed})=>{
    if(!consumed) el.style.transform = `translate(${body.position.x - currentPhysRadius}px, ${body.position.y - currentPhysRadius}px) rotate(${body.angle}rad)`;
  });
  if(negBodies.length > 0) checkNegativeCollisions();
  requestAnimationFrame(renderPhysics);
}

function shakePhysics(power=16){
  if(!engine) return;
  physicsBodies.forEach(({body})=>{
    Body.setVelocity(body, {
      x:(Math.random()-0.5)*power*2,
      y:0
    });
    Body.setAngularVelocity(body, (Math.random()-0.5)*0.3);
  });
}

let motionOn=false;
let lastMotion={x:null,y:null,z:null};
function enableMotion(){
  if(motionOn) return;
  if(typeof DeviceMotionEvent==='undefined'){
    toast("⚠️","この端末では振動検知が使えません。");
    return;
  }
  const attach = ()=>{
    window.addEventListener('devicemotion', onMotion);
    motionOn=true;
    toast("📳","本体振動を検知するようにしました");
  };
  if(typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission().then(result=>{
      if(result==='granted') attach();
      else toast("⚠️","振動検知の許可が必要です。");
    }).catch(()=>toast("⚠️","振動検知の許可取得に失敗しました。"));
  } else {
    attach();
  }
}
function onMotion(event){
  const a = event.acceleration || event.accelerationIncludingGravity;
  if(!a || a.x==null) return;
  if(lastMotion.x!=null){
    const d = Math.abs(a.x-lastMotion.x)+Math.abs(a.y-lastMotion.y)+Math.abs(a.z-lastMotion.z);
    if(d > 16) shakePhysics(10);
  }
  lastMotion = {x:a.x, y:a.y, z:a.z};
}
function performShake(){
  state.sortMode=false;
  syncPhysics();
  shakePhysics(16);
  toast("🫨","シャカシャカ…");
}

document.getElementById("saveAdd").onclick=()=>{
  const from=document.getElementById("tFrom").value, to=document.getElementById("tTo").value;
  const title=(document.getElementById("tTitle").value||"").trim() || sel.act;
  const delta=sel.delta;

  // ---- タスクとして追加（新規時のみ）----
  if(editIndex==null && addKind==='task'){
    const tt=(document.getElementById("tTitle").value||"").trim();
    if(!tt){ toast("⚠️","タスク名を入れてください"); return; }
    if(!Array.isArray(state.tasks)) state.tasks=[];
    setTemplate(tt, sel.act, sel.delta); // タスクもテンプレ学習
    state.tasks.push({ srcId:"local:"+Date.now()+":"+Math.random().toString(36).slice(2,7), title:tt, done:false, act:sel.act, delta:sel.delta, mood:sel.mood });
    closeSheets(); renderAll(); save();
    toast("📝","タスクを追加した");
    return;
  }

  // ---- 編集モード：既存の entry を更新 ----
  if(editIndex!=null){
    const e=state.entries[editIndex];
    if(e){
      e.from=from; e.to=to; e.title=title; e.act=sel.act; e.mood=sel.mood; e.delta=delta;
      e.planned = entryEndTs({date:e.date||viewDate, to}) > Date.now();
      if(e.planned){ e.dropped = planUnitsDue(e, Date.now()); } // 時間・疲労度の変更を反映
      setTemplate(title, sel.act, delta); // 編集内容もテンプレに反映
      e.needsSetup = false;
    }
    editIndex=null;
    state.entries.sort((a,b)=>(a.date||"").localeCompare(b.date||"")||a.from.localeCompare(b.from));
    closeSheets(); renderAll(); save();
    toast("✏️","更新した");
    return;
  }

  if(sel.act==="睡眠"){
    addCollected("睡眠", fatigue()); // 眠って空にした疲労量ぶん積む（表示中の日）
    state.entries.forEach(e=>{ if(e.date===viewDate) e.exp=true; });
    state.entries.push({from,to,title,act:"睡眠",mood:sel.mood,delta:0,exp:false,date:viewDate});
    state.entries.sort((a,b)=>(a.date||"").localeCompare(b.date||"")||a.from.localeCompare(b.from));
    state.sortMode=false;
    closeSheets(); renderAll(); showBack(); save();
    setTimeout(()=>toast("🛌","眠った。ケースを空にした"), 400);
    return;
  }
  // テンプレ学習（同じタイトルは次回から同じ疲労度に自動）
  setTemplate(title, sel.act, delta);

  // 記録時点で終了時刻が今より先なら「予定（グレー）」、過ぎていれば即「記録」
  const planned = entryEndTs({date:viewDate, to}) > Date.now();
  state.entries.push({from,to,title,act:sel.act,mood:sel.mood,delta,exp:false,date:viewDate,planned,dropped:0});
  state.entries.sort((a,b)=>(a.date||"").localeCompare(b.date||"")||a.from.localeCompare(b.from));
  closeSheets();
  if(planned){
    promoteDuePlans(); // 開始時刻を既に過ぎていれば、その分だけ降らせておく
    renderAll();
    save();
    toast("🗓️","予定を追加した（時間どおり1個ずつ記録）");
    return;
  }
  renderAll();
  showBack();
  setTimeout(()=>{
    if(delta < 0){
      dropNegativeParticles(sel.act, Math.abs(delta));
      toast(EMOJI_MAP[sel.act]||"✨", "回復した（"+delta+"）");
    } else {
      shakePhysics(16);
      toast(EMOJI_MAP[sel.act]||"✨", "記録した（+"+delta+"）");
    }
  }, 400);
  save();
};


/* ---- achievement (collect) page ---- */
const COLLECT_UNIT = 100; // メモリ1目盛り＝画面の高さ（単位は後で変更可）

function addCollected(act, amount){
  if(!Array.isArray(state.collected)) state.collected = [];
  const amt = Math.max(0, Math.round(amount || 0));
  if(amt <= 0) return;
  state.collected.push({ act, amount: amt, ts: Date.now() });
}
function collectTotal(){
  return (state.collected||[]).reduce((s,c)=>s + Math.max(0, Math.round(c.amount||0)), 0);
}
function collectUnits(){
  // イベントを1個ずつに展開（消えた古い順 → 底から積む）
  const arr = [];
  (state.collected||[]).forEach(c=>{
    const n = Math.max(0, Math.round(c.amount||0));
    for(let i=0;i<n;i++) arr.push({ act:c.act, ts:c.ts||0 });
  });
  return arr;
}
const COLLECT_MAX = 500; // 物理ボディ数の上限（多すぎると重いため）
let collectEngine=null, collectRunner=null, collectBodies=[], collectRAF=null, collectActive=false, collectDropT=null;

function clearCollectPhysics(){
  collectActive=false;
  if(collectRAF){ cancelAnimationFrame(collectRAF); collectRAF=null; }
  if(collectDropT){ clearTimeout(collectDropT); collectDropT=null; }
  if(collectRunner){ Runner.stop(collectRunner); collectRunner=null; }
  if(collectEngine){ World.clear(collectEngine.world,false); Engine.clear(collectEngine); collectEngine=null; }
  collectBodies=[];
}

function renderCollect(){
  const scroll = document.getElementById("collectScroll");
  const stack  = document.getElementById("collectStack");
  clearCollectPhysics();
  stack.innerHTML = "";

  let units = collectUnits();
  if(units.length > COLLECT_MAX) units = units.slice(units.length - COLLECT_MAX); // 直近を優先
  const total = units.length;

  const W  = scroll.clientWidth;
  const Hv = scroll.clientHeight;
  const itemPx = Math.max(20, (currentPhysRadius || 18) * 2); // ホーム/シャカと同サイズ
  const r = itemPx/2;
  // 約 COLLECT_UNIT 個で1画面ぶん積もる（シャカシャカと同じ密度）
  const screens = Math.max(1, Math.ceil(total / COLLECT_UNIT) + 1);
  const worldH = Math.max(Hv, screens * Hv);
  stack.style.height = worldH + "px";

  // メモリ線（画面の高さごと＝100, 200, 300 …）左右にラベル
  const levels = Math.ceil(worldH / Hv);
  for(let k=1; k<=levels; k++){
    const y = worldH - k * Hv;
    if(y < -2) continue;
    const line = document.createElement("div");
    line.className = "collect-grid";
    line.style.top = y + "px";
    const ll = document.createElement("span"); ll.className="lab-l"; ll.textContent = k * COLLECT_UNIT;
    const lr = document.createElement("span"); lr.className="lab-r"; lr.textContent = k * COLLECT_UNIT;
    line.appendChild(ll); line.appendChild(lr);
    stack.appendChild(line);
  }

  if(total === 0){
    const em = document.createElement("div");
    em.className = "collect-empty";
    em.textContent = "まだ何も。食事・休憩・睡眠で回復すると、ここに積もっていきます。";
    stack.appendChild(em);
    scroll.scrollTop = Math.max(0, worldH - Hv);
    return;
  }

  // --- physics world (シャカシャカと同じ挙動・振らない) ---
  collectEngine = Engine.create();
  collectEngine.gravity.y = 1;
  collectEngine.gravity.x = 0;
  const wt = 140;
  World.add(collectEngine.world, [
    Bodies.rectangle(W/2, worldH + wt/2, W + wt*2, wt, {isStatic:true}), // 床
    Bodies.rectangle(-wt/2, worldH/2, wt, worldH*2 + wt, {isStatic:true}), // 左壁
    Bodies.rectangle(W + wt/2, worldH/2, wt, worldH*2 + wt, {isStatic:true}), // 右壁
  ]);

  function spawn(u, x, y){
    const body = Bodies.circle(x, y, r, {restitution:0.2, friction:0.1, frictionAir:0.02, density:0.001});
    World.add(collectEngine.world, body);
    const el = document.createElement("div");
    el.className = "collect-charm";
    el.style.width = el.style.height = itemPx + "px";
    el.appendChild(actIcon(u.act, itemPx));
    stack.appendChild(el);
    collectBodies.push({body, el});
  }

  const seen = state.collectedSeen || 0;
  const olds = [], news = [];
  units.forEach(u=>{ (u.ts > seen ? news : olds).push(u); });

  // 既に積もっていた分（前回まで）: 床付近に並べて事前に落ち着かせる
  const cols = Math.max(1, Math.floor(W / itemPx));
  olds.forEach((u, idx)=>{
    const col = idx % cols, row = Math.floor(idx / cols);
    const sx = Math.min(W - r, Math.max(r, r + col*itemPx + (row%2 ? itemPx*0.5 : 0)));
    const sy = worldH - r - 2 - row * (itemPx*0.92);
    spawn(u, sx, sy);
  });
  for(let s=0; s<360; s++){ Engine.update(collectEngine, 1000/60); } // 静かに沈める

  // 一度描画して積もった状態に
  collectBodies.forEach(({body,el})=>{
    el.style.transform = `translate(${body.position.x - r}px, ${body.position.y - r}px) rotate(${body.angle}rad)`;
  });

  // 山の頂上を求めてスクロール位置に
  let pileTop = worldH;
  collectBodies.forEach(({body})=>{ pileTop = Math.min(pileTop, body.position.y - r); });
  if(collectBodies.length === 0) pileTop = worldH;
  scroll.scrollTop = Math.max(0, pileTop - Hv*0.4);

  // ライブ開始
  collectActive = true;
  collectRunner = Runner.create();
  Runner.run(collectRunner, collectEngine);
  const loop = ()=>{
    if(!collectActive) return;
    collectBodies.forEach(({body,el})=>{
      el.style.transform = `translate(${body.position.x - r}px, ${body.position.y - r}px) rotate(${body.angle}rad)`;
    });
    collectRAF = requestAnimationFrame(loop);
  };
  collectRAF = requestAnimationFrame(loop);

  // 新しく消えた分を、消えた順に上から1つずつ落とす
  const dropFromY = Math.max(r + 2, pileTop - Hv*0.7);
  let ni = 0;
  function dropNext(){
    if(!collectActive || ni >= news.length) return;
    spawn(news[ni], r + Math.random()*(W - 2*r), dropFromY);
    ni++;
    collectDropT = setTimeout(dropNext, 110);
  }
  if(news.length) collectDropT = setTimeout(dropNext, 250);

  // 「見た」記録 → 次回はこれより後の分だけ降る
  state.collectedSeen = Date.now();
  save();
}

function openCollect(){
  pausePhysics();          // 裏のホーム/シャカ演算は止めて軽くする
  renderCollect();
  document.getElementById("collectPage").classList.add("open");
}
function closeCollect(){
  document.getElementById("collectPage").classList.remove("open");
  clearCollectPhysics();
  updateMotionState();     // 元の画面の動き設定に戻す
}
document.getElementById("toCollect").onclick = openCollect;
document.getElementById("collectBack").onclick = closeCollect;

/* ---- persistence (cloud via Firebase, wired below) ---- */
function save(){
  if(window.__loggedIn){ if(window.__cloudSave) window.__cloudSave(state); }
  else { try{ localStorage.setItem("shaka_guest", JSON.stringify(state)); }catch(e){} } // ゲストは端末内に保存
}

// Bridge for the Firebase module script (loaded after this script).
// Called when a user logs in: applies their cloud data (or a fresh
// starter state for new users) and renders the app.
window.__applyState = function(data){
  viewDate = todayStr();
  if(data && Array.isArray(data.entries)){
    state = {
      entries: data.entries.map(e=>({...e, date: e.date || todayStr()})),
      sortMode: !!data.sortMode,
      collected: Array.isArray(data.collected) ? data.collected.map(c=>({...c})) : [],
      collectedSeen: typeof data.collectedSeen === "number" ? data.collectedSeen : 0,
      templates: (data.templates && typeof data.templates === "object") ? data.templates : {},
      tasks: Array.isArray(data.tasks) ? data.tasks.map(t=>({...t})) : []
    };
  } else {
    state = freshState();
  }
  const promoted = promoteDuePlans(); // アプリを閉じている間に終了した予定を記録化
  renderAll();
  if(promoted) save();
};
window.__getState = function(){ return state; };

setInterval(()=>{
  tickClock();
  tickPlans(); // 予定を時間どおりに1個ずつ降らせ、終了で記録化
}, 1000);
tickClock();

  import {
    getAuth, onAuthStateChanged, signOut,
    GoogleAuthProvider, signInWithPopup,
    signInWithEmailAndPassword, createUserWithEmailAndPassword,
    EmailAuthProvider, linkWithCredential, linkWithPopup, reauthenticateWithPopup
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import {
    initializeFirestore, persistentLocalCache, doc, getDoc, setDoc
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDY69_fbIy9rcWUSj6tLc5kMq6bb3nlYzI",
    authDomain: "do-our-best-in-moderation-tool.firebaseapp.com",
    projectId: "do-our-best-in-moderation-tool",
    storageBucket: "do-our-best-in-moderation-tool.firebasestorage.app",
    messagingSenderId: "323614318907",
    appId: "1:323614318907:web:5ee2ead7150a7d3743d71e",
    measurementId: "G-J0ETSC15KT"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  // オフラインでも直近データを表示できるようローカルキャッシュを有効化
  const db = initializeFirestore(app, { localCache: persistentLocalCache() });
  const googleProvider = new GoogleAuthProvider();
  // カレンダー/ToDo取り込み用（読み取り権限つき）。ログインとは分けて、連携時だけ許可を求める
  const calendarProvider = new GoogleAuthProvider();
  calendarProvider.addScope("https://www.googleapis.com/auth/calendar.readonly");
  calendarProvider.addScope("https://www.googleapis.com/auth/tasks.readonly");
  let googleAccessToken = null;

  const $ = (id)=>document.getElementById(id);
  const gate = $("authGate");
  const errBox = $("authErr");

  /* ---- error messages (日本語) ---- */
  function jpError(code){
    switch(code){
      case "auth/invalid-email": return "メールアドレスの形式が正しくありません。";
      case "auth/missing-password": return "パスワードを入力してください。";
      case "auth/weak-password": return "パスワードは6文字以上にしてください。";
      case "auth/email-already-in-use": return "このメールアドレスは既に登録済みです。「ログイン」を試してください。";
      case "auth/invalid-credential":
      case "auth/wrong-password":
      case "auth/user-not-found": return "メールアドレスまたはパスワードが違います。";
      case "auth/popup-closed-by-user": return "ログイン画面が閉じられました。";
      case "auth/popup-blocked": return "ポップアップがブロックされました。ブラウザの設定をご確認ください。";
      case "auth/credential-already-in-use": return "このログイン方法は既に別のアカウントで使われています。";
      case "auth/account-exists-with-different-credential":
        return "このメールは別のログイン方法で登録済みです。先にその方法でログインし、設定から連携してください。";
      case "auth/network-request-failed": return "通信エラーです。接続を確認してください。";
      default: return "エラーが発生しました（"+code+"）。";
    }
  }
  function showErr(e){ errBox.textContent = jpError((e&&e.code)||""); }
  function clearErr(){ errBox.textContent = ""; }
  function setBusy(b){
    ["googleBtn","authLoginBtn","authSignupBtn"].forEach(id=>{ const el=$(id); if(el) el.disabled=b; });
  }

  /* ---- login actions ---- */
  $("googleBtn").onclick = async ()=>{
    clearErr(); setBusy(true);
    try { await signInWithPopup(auth, googleProvider); }
    catch(e){ showErr(e); }
    finally { setBusy(false); }
  };
  $("authLoginBtn").onclick = async ()=>{
    clearErr(); setBusy(true);
    try { await signInWithEmailAndPassword(auth, $("authEmail").value.trim(), $("authPass").value); }
    catch(e){ showErr(e); }
    finally { setBusy(false); }
  };
  $("authSignupBtn").onclick = async ()=>{
    clearErr(); setBusy(true);
    try { await createUserWithEmailAndPassword(auth, $("authEmail").value.trim(), $("authPass").value); }
    catch(e){ showErr(e); }
    finally { setBusy(false); }
  };
  $("authPass").addEventListener("keydown",(e)=>{ if(e.key==="Enter") $("authLoginBtn").click(); });

  /* ---- Firestore sync ---- */
  function userDoc(){ return doc(db, "users", auth.currentUser.uid); }
  let saveTimer = null;
  window.__cloudSave = function(st){
    if(!auth.currentUser) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(()=>{
      setDoc(userDoc(), {
        entries: st.entries,
        sortMode: !!st.sortMode,
        collected: st.collected || [],
        collectedSeen: st.collectedSeen || 0,
        templates: st.templates || {},
        tasks: st.tasks || [],
        updatedAt: Date.now()
      }).catch(err=>console.warn("[shaka] save failed", err));
    }, 600);
  };

  async function loadUserData(){
    try {
      const snap = await getDoc(userDoc());
      if(snap.exists()){
        window.__applyState(snap.data());
      } else {
        // 新規ユーザー: 初期データを作成して保存
        window.__applyState(null);
        window.__cloudSave(window.__getState());
      }
    } catch(err){
      console.warn("[shaka] load failed", err);
      window.__applyState(null);
    }
  }

  /* ---- ログイン/ゲストの切替（ログインはハンバーガーメニューから） ---- */
  function updateMenuAuth(loggedIn){
    $("loginBtn").style.display = loggedIn ? "none" : "block";
    $("accountBtn").style.display = loggedIn ? "block" : "none";
  }
  function loadGuest(){
    let g = null;
    try{ const s = localStorage.getItem("shaka_guest"); if(s) g = JSON.parse(s); }catch(e){}
    window.__loggedIn = false;
    window.__applyState(g); // データ無しなら freshState のサンプルが表示される
  }
  // メニューの「ログイン」→ ログイン画面を開く
  $("loginBtn").onclick = ()=>{ $("menuDropdown").classList.remove("open"); clearErr(); gate.classList.remove("hidden"); };
  // ログイン画面を閉じる / ゲストのまま使う
  $("authClose").onclick = ()=> gate.classList.add("hidden");
  $("authGuest").onclick = ()=> gate.classList.add("hidden");

  onAuthStateChanged(auth, (user)=>{
    if(user){
      clearErr();
      $("authPass").value = "";
      gate.classList.add("hidden");
      window.__loggedIn = true;
      updateMenuAuth(true);
      loadUserData();
    } else {
      // 未ログイン＝ゲスト。画面はブロックせずサンプル/端末内データを表示
      gate.classList.add("hidden");
      updateMenuAuth(false);
      loadGuest();
    }
  });

  /* ---- account sheet (link providers / logout) ---- */
  function openSheet(){
    $("scrim").classList.add("on");
    $("accountSheet").classList.add("on");
  }
  function closeSheet(){
    $("scrim").classList.remove("on");
    $("accountSheet").classList.remove("on");
  }

  /* ---- Google Calendar / Tasks import ---- */
  function pad2m(n){ return String(n).padStart(2,"0"); }
  function hm(d){ return pad2m(d.getHours())+":"+pad2m(d.getMinutes()); }
  function ymd(d){ return d.getFullYear()+"-"+pad2m(d.getMonth()+1)+"-"+pad2m(d.getDate()); }
  function sameDay(a,b){ return ymd(a)===ymd(b); }

  async function ensureGoogleToken(){
    if(googleAccessToken) return googleAccessToken;
    const u = auth.currentUser;
    if(!u) return null;
    const hasGoogle = u.providerData.some(p=>p.providerId==="google.com");
    // Googleログイン済みなら再認証、メール/パスワードのみなら連携してトークン取得
    const result = hasGoogle
      ? await reauthenticateWithPopup(u, calendarProvider)
      : await linkWithPopup(u, calendarProvider);
    const cred = GoogleAuthProvider.credentialFromResult(result);
    googleAccessToken = (cred && cred.accessToken) || null;
    return googleAccessToken;
  }

  async function fetchCalendarToday(token){
    const start = new Date(); start.setHours(0,0,0,0);
    const end = new Date(); end.setHours(23,59,59,999);
    const url = "https://www.googleapis.com/calendar/v3/calendars/primary/events"
      + "?timeMin=" + encodeURIComponent(start.toISOString())
      + "&timeMax=" + encodeURIComponent(end.toISOString())
      + "&singleEvents=true&orderBy=startTime";
    const res = await fetch(url, { headers:{ Authorization:"Bearer "+token } });
    if(!res.ok) throw new Error("calendar "+res.status);
    const data = await res.json();
    return (data.items||[])
      .filter(ev=>ev.status!=="cancelled")
      .map(ev=>{
        const allDay = !(ev.start && ev.start.dateTime);
        const s = ev.start && (ev.start.dateTime || (ev.start.date ? ev.start.date+"T00:00:00" : null));
        const e = ev.end && (ev.end.dateTime || (ev.end.date ? ev.end.date+"T00:00:00" : null));
        const sd = s ? new Date(s) : new Date();
        const ed = e ? new Date(e) : sd;
        return {
          srcId: "cal:"+ev.id,
          title: ev.summary || "(無題の予定)",
          date: ymd(sd),
          from: allDay ? "00:00" : hm(sd),
          to:   allDay ? "23:59" : hm(ed)
        };
      });
  }

  async function fetchTasksToday(token){
    const url = "https://tasks.googleapis.com/tasks/v1/lists/@default/tasks?showCompleted=false&maxResults=100";
    const res = await fetch(url, { headers:{ Authorization:"Bearer "+token } });
    if(!res.ok) throw new Error("tasks "+res.status);
    const data = await res.json();
    const now = new Date();
    return (data.items||[])
      .filter(t=>t.due && sameDay(new Date(t.due), now)) // 今日が期限のToDo
      .map(t=>({
        srcId: "task:"+t.id,
        title: t.title || "(無題のToDo)",
        date: ymd(now),
        from: "00:00",
        to: "23:59" // 時刻が無いので終日扱い → 1日の終わりに自動記録
      }));
  }

  async function syncGoogleData(){
    try {
      window.__toast && window.__toast("⏳","取り込み中…");
      const token = await ensureGoogleToken();
      if(!token){ window.__toast && window.__toast("⚠️","Google連携が必要です"); return; }
      const [cal, tasks] = await Promise.all([
        fetchCalendarToday(token).catch(e=>{ console.warn("[shaka] calendar", e); return []; }),
        fetchTasksToday(token).catch(e=>{ console.warn("[shaka] tasks", e); return []; })
      ]);
      const nCal = window.__importEvents ? window.__importEvents(cal) : 0;
      const nTask = window.__importTasks ? window.__importTasks(tasks) : 0;
      const n = nCal + nTask;
      window.__toast && window.__toast("🗓️", n>0 ? "予定"+nCal+"件・ToDo"+nTask+"件" : "新しい予定はなし");
    } catch(e){
      console.warn("[shaka] sync failed", e);
      window.__toast && window.__toast("⚠️", "取り込み失敗: "+jpError((e&&e.code)||""));
    }
  }

  window.__renderAccount = function(){
    const u = auth.currentUser;
    if(!u) return;
    const providers = u.providerData.map(p=>p.providerId);
    const hasGoogle = providers.includes("google.com");
    const hasPassword = providers.includes("password");
    const body = $("accountBody");
    body.innerHTML = "";

    const head = document.createElement("div");
    head.className = "acct-head"; head.textContent = "アカウント";
    const mail = document.createElement("div");
    mail.className = "acct-mail"; mail.textContent = u.email || "（メール未設定）";
    body.appendChild(head); body.appendChild(mail);

    const label = document.createElement("div");
    label.className = "acct-label"; label.textContent = "ログイン方法";
    body.appendChild(label);

    body.appendChild(provRow("Google", hasGoogle));
    body.appendChild(provRow("メール＋パスワード", hasPassword));

    // カレンダー / ToDo 取り込み
    const syncLabel = document.createElement("div");
    syncLabel.className = "acct-label"; syncLabel.style.marginTop = "16px";
    syncLabel.textContent = "Googleカレンダー / ToDo";
    body.appendChild(syncLabel);
    const syncBtn = document.createElement("button");
    syncBtn.className = "acct-link"; syncBtn.textContent = "今日の予定/ToDoを取り込む";
    syncBtn.onclick = async ()=>{ closeSheet(); await syncGoogleData(); };
    body.appendChild(syncBtn);

    if(!hasGoogle){
      const b = document.createElement("button");
      b.className = "acct-link"; b.textContent = "Googleアカウントを連携";
      b.onclick = async ()=>{
        try {
          await linkWithPopup(u, googleProvider);
          window.__toast && window.__toast("🔗","Googleを連携しました");
          window.__renderAccount();
        } catch(e){ window.__toast && window.__toast("⚠️", jpError((e&&e.code)||"")); }
      };
      body.appendChild(b);
    }

    if(!hasPassword){
      const wrap = document.createElement("div");
      wrap.className = "acct-set";
      const note = document.createElement("div");
      note.className = "acct-label";
      note.style.marginTop = "10px";
      note.textContent = "メール＋パスワードを追加";
      const em = document.createElement("input");
      em.className = "authinput"; em.type = "email"; em.placeholder = "メールアドレス";
      em.value = u.email || "";
      const pw = document.createElement("input");
      pw.className = "authinput"; pw.type = "password"; pw.placeholder = "パスワード（6文字以上）";
      const b = document.createElement("button");
      b.className = "acct-link"; b.textContent = "パスワードを設定";
      b.onclick = async ()=>{
        try {
          const cred = EmailAuthProvider.credential(em.value.trim(), pw.value);
          await linkWithCredential(u, cred);
          window.__toast && window.__toast("🔗","パスワードを設定しました");
          window.__renderAccount();
        } catch(e){ window.__toast && window.__toast("⚠️", jpError((e&&e.code)||"")); }
      };
      wrap.appendChild(note); wrap.appendChild(em); wrap.appendChild(pw); wrap.appendChild(b);
      body.appendChild(wrap);
    }

    const out = document.createElement("button");
    out.className = "btn sunk";
    out.style.cssText = "width:100%;padding:14px;margin-top:22px";
    out.textContent = "ログアウト";
    out.onclick = async ()=>{ closeSheet(); await signOut(auth); };
    body.appendChild(out);
  };

  function provRow(name, on){
    const row = document.createElement("div");
    row.className = "acct-prov";
    const n = document.createElement("span"); n.textContent = name;
    const s = document.createElement("span");
    s.className = on ? "on" : "off";
    s.textContent = on ? "連携済み" : "未連携";
    row.appendChild(n); row.appendChild(s);
    return row;
  }

  $("accountBtn").onclick = ()=>{
    $("menuDropdown").classList.remove("open");
    window.__renderAccount();
    openSheet();
  };

  // toast bridge (main script defines toast())
  window.__toast = (em,txt)=>{ if(window.toast) window.toast(em,txt); };
</script>
</body>
</html>
